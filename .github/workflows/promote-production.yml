name: Promote to PRODUCTION

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Exact image tag to promote from STAGING → PRODUCTION (e.g. sha-abc1234)"
        required: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 996810415034.dkr.ecr.us-east-1.amazonaws.com

jobs:
  promote:
    name: Promote ${{ inputs.image_tag }} → PRODUCTION
    runs-on: ubuntu-latest
    environment: PRODUCTION
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - uses: imjasonh/setup-crane@v0.4

      - name: Copy images STAGING → PRODUCTION ECR
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          for SERVICE in api worker; do
            SRC="${ECR_REGISTRY}/ctdl-xtra-staging/${SERVICE}:${IMAGE_TAG}"
            DST="${ECR_REGISTRY}/ctdl-xtra/${SERVICE}:${IMAGE_TAG}"
            echo "Copying ${SRC} → ${DST}"
            crane copy "${SRC}" "${DST}"
          done

      - name: Configure kubeconfig
        run: aws eks update-kubeconfig --name ctdl-xtra-prod --region "$AWS_REGION" --alias ctdl-xtra-prod

      - name: Deploy
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          KUBE_CONTEXT: ctdl-xtra-prod
        run: bash infra/terraform/k8s-manifests/production/app/deploy-app.sh

      - name: Summary
        run: |
          echo "### Promoted \`${{ inputs.image_tag }}\` to PRODUCTION" >> "$GITHUB_STEP_SUMMARY"
