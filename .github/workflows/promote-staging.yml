name: Promote to STAGING

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (sha-xxxxxxx or main-latest)"
        required: false
        default: main-latest

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  promote:
    name: Deploy ${{ inputs.image_tag }} → STAGING
    runs-on: ubuntu-latest
    environment: STAGING
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubeconfig
        run: aws eks update-kubeconfig --name ctdl-xtra-staging --region "$AWS_REGION" --alias ctdl-xtra-staging

      - name: Deploy
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          KUBE_CONTEXT: ctdl-xtra-staging
        run: bash infra/terraform/k8s-manifests/staging/app/deploy-app.sh

      - name: Summary
        run: |
          echo "### Deployed \`${{ inputs.image_tag }}\` to STAGING" >> "$GITHUB_STEP_SUMMARY"
