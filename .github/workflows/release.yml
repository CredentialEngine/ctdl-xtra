name: Release

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 996810415034.dkr.ecr.us-east-1.amazonaws.com

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Install client deps
        run: pnpm install
        working-directory: client

      - name: Lint
        run: pnpm run lint
        working-directory: client

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: server/pnpm-lock.yaml

      - name: Install server deps
        run: pnpm install
        working-directory: server

      - name: Test
        run: pnpm exec vitest run
        working-directory: server

  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    needs: [lint, test]
    outputs:
      image_tag: ${{ steps.tag.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        run: echo "value=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/ctdl-xtra-staging/api:${{ steps.tag.outputs.value }}
            ${{ env.ECR_REGISTRY }}/ctdl-xtra-staging/api:main-latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build & push Worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: worker.Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/ctdl-xtra-staging/worker:${{ steps.tag.outputs.value }}
            ${{ env.ECR_REGISTRY }}/ctdl-xtra-staging/worker:main-latest
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

      - name: Summary
        run: echo "### Published \`${{ steps.tag.outputs.value }}\` to STAGING ECR" >> "$GITHUB_STEP_SUMMARY"
