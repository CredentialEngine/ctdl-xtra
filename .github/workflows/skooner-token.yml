name: Generate Skooner token

on:
  workflow_dispatch:
    inputs:
      duration:
        description: "Token duration"
        type: choice
        required: true
        default: 2h
        options:
          - 30m
          - 2h
          - 6h
      whitelist_source_range:
        description: "Optional NGINX whitelist-source-range (CIDR(s), comma-separated)"
        type: string
        required: false
      role:
        description: "Access level for skooner-sa"
        type: choice
        required: true
        default: view
        options:
          - view
          - developer
          - cluster-admin

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER: cer-api-prod
  SA_NAMESPACE: kube-system
  SA_NAME: skooner-sa
  APP_NAMESPACE: ctdl-xtra

jobs:
  token:
    if: ${{ github.repository_owner == 'CredentialEngine' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.6

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name "${{ env.EKS_CLUSTER }}" --region "${{ env.AWS_REGION }}"

      - name: Mask sensitive inputs
        if: ${{ inputs.whitelist_source_range != '' }}
        env:
          WHITELIST: ${{ inputs.whitelist_source_range }}
        run: |
          echo "::add-mask::${WHITELIST}"

      - name: Validate RBAC (dry-run)
        env:
          ROLE: ${{ inputs.role }}
        run: |
          NS="${SA_NAMESPACE}"
          SA="${SA_NAME}"
          APP_NS="${APP_NAMESPACE}"
          echo "Validating role: ${ROLE}"
          if [ "${ROLE}" = "cluster-admin" ]; then
            kubectl create clusterrolebinding "${SA}" \
              --clusterrole="cluster-admin" \
              --serviceaccount="${NS}:${SA}" \
              --dry-run=client -o yaml > /tmp/rbac-validate.yaml
            kubectl apply --dry-run=server -f /tmp/rbac-validate.yaml
          elif [ "${ROLE}" = "developer" ]; then
            kubectl create clusterrolebinding "${SA}-developer-view" \
              --clusterrole="view" \
              --serviceaccount="${NS}:${SA}" \
              --dry-run=client -o yaml > /tmp/rbac-validate-view.yaml
            kubectl apply --dry-run=server -f /tmp/rbac-validate-view.yaml
            kubectl -n "${APP_NS}" create rolebinding "${SA}-developer-edit" \
              --clusterrole="edit" \
              --serviceaccount="${NS}:${SA}" \
              --dry-run=client -o yaml > /tmp/rbac-validate-edit.yaml
            kubectl -n "${APP_NS}" apply --dry-run=server -f /tmp/rbac-validate-edit.yaml
          fi

      - name: Apply RBAC for skooner-sa
        id: rbac
        env:
          ROLE: ${{ inputs.role }}
        run: |
          NS="${SA_NAMESPACE}"
          SA="${SA_NAME}"
          APP_NS="${APP_NAMESPACE}"
          echo "Applying role: ${ROLE}"
          if [ "${ROLE}" = "cluster-admin" ]; then
            kubectl create clusterrolebinding "${SA}" \
              --clusterrole="cluster-admin" \
              --serviceaccount="${NS}:${SA}" \
              --dry-run=client -o yaml > /tmp/rbac.yaml
            kubectl apply -f /tmp/rbac.yaml
            echo "binding_kind=ClusterRoleBinding" >> "$GITHUB_OUTPUT"
            echo "binding_namespace=cluster-wide" >> "$GITHUB_OUTPUT"
          elif [ "${ROLE}" = "developer" ]; then
            kubectl create clusterrolebinding "${SA}-developer-view" \
              --clusterrole="view" \
              --serviceaccount="${NS}:${SA}" \
              --dry-run=client -o yaml > /tmp/rbac-view.yaml
            kubectl apply -f /tmp/rbac-view.yaml
            kubectl -n "${APP_NS}" create rolebinding "${SA}-developer-edit" \
              --clusterrole="edit" \
              --serviceaccount="${NS}:${SA}" \
              --dry-run=client -o yaml > /tmp/rbac-edit.yaml
            kubectl -n "${APP_NS}" apply -f /tmp/rbac-edit.yaml
            kubectl delete clusterrolebinding "${SA}" --ignore-not-found
            echo "binding_kind=developer" >> "$GITHUB_OUTPUT"
            echo "binding_namespace=cluster-wide,${APP_NS}" >> "$GITHUB_OUTPUT"
          else
            kubectl delete clusterrolebinding "${SA}" --ignore-not-found
            kubectl delete clusterrolebinding "${SA}-developer-view" --ignore-not-found
            kubectl -n "${APP_NS}" delete rolebinding "${SA}-developer-edit" --ignore-not-found
            echo "binding_kind=view-only" >> "$GITHUB_OUTPUT"
            echo "binding_namespace=${NS}" >> "$GITHUB_OUTPUT"
          fi

      - name: Update Skooner Ingress whitelist (optional)
        if: ${{ inputs.whitelist_source_range != '' }}
        env:
          WHITELIST: ${{ inputs.whitelist_source_range }}
        run: |
          echo "Setting whitelist-source-range"
          kubectl -n kube-system annotate ingress skooner-ingress \
            nginx.ingress.kubernetes.io/whitelist-source-range="${WHITELIST}" --overwrite

      - name: Create Skooner token
        id: tok
        env:
          DURATION: ${{ inputs.duration }}
          SA_NAMESPACE: ${{ env.SA_NAMESPACE }}
          SA_NAME: ${{ env.SA_NAME }}
        run: |
          SA_NS="${SA_NAMESPACE:-kube-system}"
          echo "Creating token for SA ${SA_NS}/${SA_NAME} (duration ${DURATION})"
          TOKEN=$(kubectl -n "${SA_NS}" create token "${SA_NAME}" --duration="${DURATION}")
          echo "token=${TOKEN}" >> "$GITHUB_OUTPUT"
          echo "sa_ns=${SA_NS}" >> "$GITHUB_OUTPUT"

      - name: Send token to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ACTOR: ${{ github.actor }}
          DURATION: ${{ inputs.duration }}
          ROLE: ${{ inputs.role }}
          WHITELIST_CONFIGURED: ${{ inputs.whitelist_source_range != '' }}
          BINDING_KIND: ${{ steps.rbac.outputs.binding_kind }}
          BINDING_NS: ${{ steps.rbac.outputs.binding_namespace }}
          SA_NAME: ${{ env.SA_NAME }}
          SA_NS: ${{ steps.tok.outputs.sa_ns }}
          TOKEN: ${{ steps.tok.outputs.token }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL}" ]; then
            echo "SLACK_WEBHOOK_URL not set; skipping notification"
            exit 0
          fi
          payload=$(jq -nc \
            --arg repo "$REPO" \
            --arg run "$RUN_URL" \
            --arg actor "$ACTOR" \
            --arg duration "$DURATION" \
            --arg role "$ROLE" \
            --arg ns "$BINDING_NS" \
            --arg whitelist_configured "$WHITELIST_CONFIGURED" \
            --arg token "$TOKEN" \
            '
            {
              text: "Skooner token generated",
              blocks: [
                { "type": "header", "text": { "type": "plain_text", "text": "Skooner token" } },
                { "type": "section", "fields": [
                    {"type":"mrkdwn", "text": "*Requested by:*\n\($actor)"},
                    {"type":"mrkdwn", "text": "*Duration:*\n\($duration)"},
                    {"type":"mrkdwn", "text": "*Role:*\n\($role)"},
                    {"type":"mrkdwn", "text": "*Namespace:*\n\($ns)"}
                  ]
                },
                { "type": "section", "fields": [
                    {"type":"mrkdwn", "text": "*Whitelist:*\n\(if $whitelist_configured == "true" then "configured" else "unchanged" end)"}
                  ]
                },
                { "type": "section", "text": { "type": "mrkdwn", "text": "*Token:*\n```\($token)```" } },
                { "type": "context", "elements": [
                    {"type":"mrkdwn", "text": "<\($run)|View run>"},
                    {"type":"mrkdwn", "text": $repo},
                    {"type":"mrkdwn", "text": "<https://status.cer-api.credentialengineregistry.org/#!workload|Open Skooner>"}
                  ]
                }
              ]
            }
            ')
          curl -sS -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL" || true
