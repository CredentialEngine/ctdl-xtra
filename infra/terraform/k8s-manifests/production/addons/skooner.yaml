apiVersion: v1
kind: ServiceAccount
metadata:
  name: skooner-sa
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: skooner-sa-view
subjects:
  - kind: ServiceAccount
    name: skooner-sa
    namespace: kube-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: skooner
  namespace: kube-system
spec:
  replicas: 1
  selector:
    matchLabels:
      k8s-app: skooner
  template:
    metadata:
      labels:
        k8s-app: skooner
    spec:
      serviceAccountName: skooner-sa
      nodeSelector:
        kubernetes.io/os: linux
      containers:
        - name: skooner
          image: ghcr.io/skooner-k8s/skooner:stable
          ports:
            - containerPort: 4654
          livenessProbe:
            httpGet:
              scheme: HTTP
              path: /
              port: 4654
            initialDelaySeconds: 30
            timeoutSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: skooner
  namespace: kube-system
spec:
  ports:
    - port: 80
      targetPort: 4654
  selector:
    k8s-app: skooner
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: skooner-certificate
  namespace: kube-system
spec:
  secretName: skooner-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - status.xtra.credentialengineregistry.org
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: skooner-ingress
  namespace: kube-system
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - status.xtra.credentialengineregistry.org
      secretName: skooner-tls
  rules:
    - host: status.xtra.credentialengineregistry.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: skooner
                port:
                  number: 80
