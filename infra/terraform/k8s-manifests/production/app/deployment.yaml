apiVersion: apps/v1
kind: Deployment
metadata:
  name: ctdl-xtra-api
  namespace: ctdl-xtra
  labels:
    app.kubernetes.io/name: ctdl-xtra
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: ctdl-xtra
    environment: prod
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: ctdl-xtra
      app.kubernetes.io/component: api
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ctdl-xtra
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: ctdl-xtra
        environment: prod
    spec:
      serviceAccountName: ctdl-xtra
      nodeSelector:
        nodepool: app
      containers:
        - name: api
          image: 996810415034.dkr.ecr.us-east-1.amazonaws.com/ctdl-xtra/api:prod-20260514-d36bff263e6e-r2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: RUN_MIGRATIONS
              value: "false"
            - name: LOG_LEVEL
              value: info
            - name: NODE_EXTRA_CA_CERTS
              value: /etc/ssl/certs/rds-global-bundle.pem
          envFrom:
            - secretRef:
                name: ctdl-xtra-app-env
          readinessProbe:
            httpGet:
              path: /up
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /up
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /up
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 18
          volumeMounts:
            - name: extraction-files
              mountPath: /data/extractions
            - name: rds-ca-bundle
              mountPath: /etc/ssl/certs/rds-global-bundle.pem
              subPath: rds-global-bundle.pem
              readOnly: true
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 3Gi
      volumes:
        - name: extraction-files
          persistentVolumeClaim:
            claimName: ctdl-xtra-files
        - name: rds-ca-bundle
          configMap:
            name: rds-ca-bundle
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ctdl-xtra-worker
  namespace: ctdl-xtra
  labels:
    app.kubernetes.io/name: ctdl-xtra
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: ctdl-xtra
    environment: prod
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: ctdl-xtra
      app.kubernetes.io/component: worker
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ctdl-xtra
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: ctdl-xtra
        environment: prod
    spec:
      serviceAccountName: ctdl-xtra
      nodeSelector:
        nodepool: app
      terminationGracePeriodSeconds: 60
      containers:
        - name: worker
          image: 996810415034.dkr.ecr.us-east-1.amazonaws.com/ctdl-xtra/worker:prod-20260514-d36bff263e6e-r2
          imagePullPolicy: IfNotPresent
          env:
            - name: LOG_LEVEL
              value: info
            - name: NODE_EXTRA_CA_CERTS
              value: /etc/ssl/certs/rds-global-bundle.pem
          envFrom:
            - secretRef:
                name: ctdl-xtra-app-env
          volumeMounts:
            - name: extraction-files
              mountPath: /data/extractions
            - name: rds-ca-bundle
              mountPath: /etc/ssl/certs/rds-global-bundle.pem
              subPath: rds-global-bundle.pem
              readOnly: true
          resources:
            requests:
              cpu: 750m
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
      volumes:
        - name: extraction-files
          persistentVolumeClaim:
            claimName: ctdl-xtra-files
        - name: rds-ca-bundle
          configMap:
            name: rds-ca-bundle
