apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: ctdl-xtra-efs
provisioner: efs.csi.aws.com
parameters:
  provisioningMode: efs-ap
  fileSystemId: fs-00d4b313d702350ad
  directoryPerms: "0755"
  gidRangeStart: "1000"
  gidRangeEnd: "2000"
  basePath: "/ctdl-xtra"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ctdl-xtra-storage
  namespace: ctdl-xtra
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ctdl-xtra-efs
  resources:
    requests:
      storage: 20Gi
