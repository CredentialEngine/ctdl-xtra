apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ctdl-xtra-web
  namespace: ctdl-xtra
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - ctdl-xtra.credentialengine.org
      secretName: ctdl-xtra-web-tls
  rules:
    - host: ctdl-xtra.credentialengine.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ctdl-xtra-web
                port:
                  number: 80
