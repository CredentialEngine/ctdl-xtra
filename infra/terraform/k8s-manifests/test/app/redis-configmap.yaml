apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: ctdl-xtra
data:
  redis.conf: |
    bind 0.0.0.0
    port 6379
    protected-mode yes
    tcp-keepalive 300
    maxmemory 512mb
    maxmemory-policy noeviction

    # AOF persistence
    appendonly yes
    appendfsync everysec
    auto-aof-rewrite-percentage 100
    auto-aof-rewrite-min-size 64mb

    # RDB snapshots
    save 900 1
    save 300 10
    save 60 10000
    dbfilename dump.rdb
    dir /data

    # Auth (injected via secret volume)
    include /run/redis-auth/redis-password.conf
