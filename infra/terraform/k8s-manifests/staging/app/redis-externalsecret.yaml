apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: redis-auth
  namespace: ctdl-xtra
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secret-manager
    kind: ClusterSecretStore
  target:
    name: redis-auth
    creationPolicy: Owner
    template:
      data:
        password: "{{ .password }}"
        redis-password.conf: "requirepass {{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: ctdl-xtra/staging/redis
        property: password
